<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xsto.r8 Store</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b0b0b;
color:white;
}

header{
background:#111;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:2px solid gold;
position:sticky;
top:0;
}

.logo{
font-size:30px;
color:gold;
font-weight:bold;
}

nav a{
color:white;
text-decoration:none;
margin-left:18px;
font-size:18px;
}

.hero{
padding:90px 20px;
text-align:center;
}

.hero h1{
font-size:55px;
color:gold;
margin-bottom:15px;
}

.hero p{
font-size:22px;
color:#ccc;
margin-bottom:35px;
}

.button{
background:gold;
color:black;
padding:15px 35px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
font-size:20px;
}

.games{
padding:40px 20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}

.card{
background:#171717;
border:1px solid gold;
border-radius:15px;
padding:25px;
text-align:center;
}

.card h2{
color:gold;
margin-bottom:15px;
}

.card p{
color:#ccc;
margin-bottom:20px;
}

.buy{
display:inline-block;
background:gold;
color:black;
padding:12px 25px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
}

footer{
padding:30px;
text-align:center;
color:#777;
}

</style>
</head>

<body>

<header>

<div class="logo">
Xsto.r8
</div>

<nav>
<a href="#">Home</a>
<a href="#">Games</a>
<a href="#">About</a>
<a href="#">Contact</a>
</nav>

</header>

<section class="hero">

<h1>Premium Game Accounts</h1>

<p>Fast Delivery • Safe • Trusted</p>

<a href="#games" class="button">
Browse Games
</a>

</section>

<section class="games" id="games">

<div class="card">
<h2>🎱 8 Ball Pool</h2>
<p>Premium Accounts</p>
<a href="#" class="buy">Buy Now</a>
</div>

<div class="card">
<h2>⭐ Brawl Stars</h2>
<p>High Value Accounts</p>
<a href="#" class="buy">Buy Now</a>
</div>

<div class="card">
<h2>🎮 More Games</h2>
<p>Coming Soon</p>
<a href="#" class="buy">Soon</a>
</div>

</section>

<footer>

© 2026 Xsto.r8 Store

</footer>

</body>
</html>
